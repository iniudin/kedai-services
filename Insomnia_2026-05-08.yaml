    meta:
      id: req_orders_create_success
      sortKey: 800
    method: POST
    body:
      mimeType: application/json
      text: |
        {
          "items": [
            {
              "productId": {{ last_product_id }},
              "quantity": 2,
              "addOnIds": [{{ last_addon_id }}]
            }
          ],
          "amountPaid": 50000
        }
    headers:
      - name: Content-Type
        value: application/json
    scripts:
      afterResponse: |+
