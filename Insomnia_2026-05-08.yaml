  description: Collection for Kedai POS API testing
collection:
  - url: https://kedai.udin.my.id/products
    name: Create Products - Success
    meta:
      id: req_products_create_success
      created: 1778029855692
      modified: 1778211987192
      isPrivate: false
      sortKey: 100
    method: POST
    body:
      mimeType: application/json
      text: |
        {
          "name": "Es Krim",
          "costPrice": 10000,
          "sellPrice": 15000
        }
    headers:
      - name: Content-Type
        value: application/json
    scripts:
      afterResponse: |+
        insomnia.test('Check if status is 201', () => {
            insomnia.expect(insomnia.response.code).to.eql(201);
        });
        const body = JSON.parse(insomnia.response.body);
        insomnia.environment.set("last_product_id", body.id);

